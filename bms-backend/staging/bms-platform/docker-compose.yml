services:
  app:
    build: 
      ./app
    ports: 
      - 8000:8000
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./app:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - bms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 5s

  db:
    database_url:
      - postgres://appuser:password@db:5432/bms